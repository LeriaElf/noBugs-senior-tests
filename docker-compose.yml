services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_DB: nbank
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - '5433:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U postgres -d nbank']
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - nbank-network
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    image: nobugsme/nbank:with_validation_fix
    ports:
      - '4111:4111'
    environment:
      - ADMIN_USERNAME=admin
      - ADMIN_PASSWORD=admin
    networks:
      - nobugs-network

  frontend:
    image: nobugsme/nbank-ui:with_nginx_with_send_transfer_fix
    expose:
      - '80'
    depends_on:
      - backend
    networks:
      - nobugs-network

  nginx:
    image: nginx:latest
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - backend
      - frontend
    networks:
      - nobugs-network

networks:
  nobugs-network:
    name: nobugs-network
