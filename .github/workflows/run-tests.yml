name: Run tests

on:
  push:
    paths: ['ui/**', 'api/**']
  workflow_dispatch:

jobs:
  run-tests:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cache Docker images
        id: cache-docker
        uses: actions/cache@v4
        with:
          path: /tmp/docker-images
          key: docker-images-${{ hashFiles('docker-compose.yml') }}

      - name: Load Docker images from cache
        if: steps.cache-docker.outputs.cache-hit == 'true'
        run: |
          docker load -i /tmp/docker-images/backend.tar
          docker load -i /tmp/docker-images/frontend.tar

      - name: Pull and save Docker images
        if: steps.cache-docker.outputs.cache-hit != 'true'
        run: |
          docker pull nobugsme/nbank:with_validation_fix
          docker pull nobugsme/nbank-ui:preprod_version
          mkdir -p /tmp/docker-images
          docker save nobugsme/nbank:with_validation_fix -o /tmp/docker-images/backend.tar
          docker save nobugsme/nbank-ui:preprod_version -o /tmp/docker-images/frontend.tar

      - name: Start services (backend, frontend, nginx)
        run: docker compose up -d

      - name: Wait for backend to be ready
        run: |
          for i in $(seq 1 90); do
            if curl -s -o /dev/null http://localhost:4111/api/v1; then
              echo "Backend is ready"
              break
            fi
            echo "Attempt $i/90, waiting 5s..."
            sleep 5
          done

      - name: Build test image
        run: docker build -t nobugs-tests .

      - name: Run tests
        run: |
          mkdir -p test-output/logs test-output/api-report test-output/ui-report
          docker run --rm \
            --network nobugs-network \
            -v ${{ github.workspace }}/test-output/logs:/app/logs \
            -v ${{ github.workspace }}/test-output/api-report:/app/mochawesome-report \
            -v ${{ github.workspace }}/test-output/ui-report:/app/playwright-report \
            -e CI=true \
            -e BASE_URL=http://backend:4111/api/v1 \
            -e UI_BASE_URL=http://nginx \
            -e "ADMIN_TOKEN=Basic YWRtaW46YWRtaW4=" \
            nobugs-tests

      - name: Show test log
        if: always()
        run: cat test-output/logs/run.log 2>/dev/null || echo "No log file"

      - name: Upload test reports
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-reports-${{ github.run_number }}
          path: test-output/
          retention-days: 7

      - name: Stop services
        if: always()
        run: docker compose down
